hero:
  title: 常用工具
  lead: 平常搜罗到的好用的工具
  eyebrow: ""

sections:
  - title: 编程
    description: 整活/提高变成效率的一些小工具
    items:
      - title: Graph Editor
        favicon: https://csacademy.com/static/icon.png
        description: 在线搭图、拖边、调整权值和节点布局都很顺手，适合写文章时插图。
        url: https://csacademy.com/app/graph_editor/
      - title: Excalidraw
        favicon: https://excalidraw.com/apple-touch-icon.png
        description: 简洁美观的手绘风格流程图
        url: https://excalidraw.com/
      - title: AsciiDraw
        favicon: https://asciidraw.puppylab.org/favicon.ico
        description: 适合快速画终端风格结构图、流程草图和 README 里的字符图，不用本地装额外工具。
        url: https://asciidraw.puppylab.org/
      - title: 正则表达式在线测试
        favicon: https://www.jyshare.com/favicon.ico
        description: 快速试错、替换、验证常见表达式时很方便，适合处理文本清洗和前端匹配规则。
        url: https://www.jyshare.com/front-end/854/
      - title: Compiler Explorer
        favicon: https://static.ce-cdn.net/site-logo.svg
        description: 看不同编译器、不同优化等级下的汇编输出几乎是必备工具，写 C/C++、Rust 和汇编时都很好用。
        url: https://godbolt.org/
      - title: ExplainShell
        description: Write down a command-line to see the help text that matches each argument.
        url: https://explainshell.com/
      - title: cdecl
        description: C gibberish to English.
        url: https://cdecl.org/
      - title: Learn Git Branching
        description:  A great interactive visualization of how branches work
        url: https://learngitbranching.js.org/

  - title: 网络
    description: 一些网络/ Web 相关的工具
    items:
      - title: HTTP Bin
        description: A simple HTTP Request & Response Service.
        url: https://httpbin.org/
      - title: Check Host
        description: An online tool for checking availability of websites, servers, hosts and IP addresses. It provides domain and IP address location data from a few geolocation IP databases and whois as well.
        url: https://check-host.net/
      - title: Scrensy
        description: 极其便捷的屏幕共享网站！
        url: https://screensy.marijn.it/


  - title: 设计
    description: 平时做美工可能会用到的小工具（纯业余）
    items:
      - title: Eva Colors
        favicon: https://colors.eva.design/favicon.ico
        description: 可以快速生成和预览成体系的颜色层级，做浅色系 UI 或整理品牌色时尤其省时间。
        url: https://colors.eva.design/

  - title: 数学
    description: ""
    items:
      - title: GeoGebra
        favicon: ""
        description: 快速回答你的数学问题，比如 1000 以内的素数.
        url: https://www.geogebra.org/classic?lang=zh_CN
